name: CICD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t rashmi741/weather-app:latest .
        env:
          VITE_WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}

      - name: Publish image to docker hub
        run: docker push rashmi741/weather-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST != '' && secrets.EC2_HOST || vars.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER != '' && secrets.EC2_USER || vars.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_PORT: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || vars.EC2_PORT || '22' }}
    steps:
      - name: Validate deploy secrets
        run: |
          set -e
          test -n "$EC2_HOST" || (echo "::error::Missing EC2 host. Set secret EC2_HOST or variable EC2_HOST" && exit 1)
          test -n "$EC2_USER" || (echo "::error::Missing EC2 user. Set secret EC2_USER or variable EC2_USER" && exit 1)
          test -n "$EC2_SSH_KEY" || (echo "::error::Missing GitHub secret EC2_SSH_KEY" && exit 1)
          test -n "$EC2_PORT" || (echo "::error::Missing EC2 port. Set secret EC2_PORT or variable EC2_PORT" && exit 1)

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_SSH_KEY }}
          port: ${{ env.EC2_PORT }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -e
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker pull rashmi741/weather-app:latest
            docker stop reactContainer || true
            docker rm reactContainer || true
            docker run -d -p 80:80 --name reactContainer --restart unless-stopped rashmi741/weather-app:latest

   