name: CICD

on:
  push:
    branches:
      - main

jobs:
  build:
   runs-on: ubuntu-latest
   steps:
    - name: Checkout Source
      uses: actions/checkout@v2

    - name: Login to Docker Hub
      run: docker login -u -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t rashmi741/weather-app .
      env:
          VITE_WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}


    - name: Publish image to docker hub
      run: docker push rashmi741/weather-app:latest

  deploy:
    needs: build
    runs-on: aws-ec2
    steps:
      - name: Pull image from docker hub
        run: docker pull rashmi741/weather-app:latest
      - name: Run Docker Container
        run: docker run
      - name: Delete old container
        run: docker run -d -p 3000:80 --name reactContainer rashmi741/weather-app

   